<style>

  :root {
    --bg:        #faf8f4;
    --surface:   #ffffff;
    --border:    #e8e0d4;
    --text:      #1c1917;
    --muted:     #78716c;

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);

  /* ── HEADER ── */
  header {

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;

  .header-title span { color: var(--accent); }

  .week-nav {

  .btn-nav {

    display: flex; align-items: center; justify-content: center;

  #week-label {

  .btn-today {

    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .2s;
  }
  .btn-today:hover { opacity: .85; }

  /* ── MAIN GRID ── */
  main { padding: 20px 16px 80px; max-width: 960px; margin: 0 auto; }

  #loading {
    text-align: center;
    padding: 60px 20px;

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);

    margin: 0 auto 12px;
  }

  /* ── CALENDAR GRID ── */

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);

  .day-col {

  .day-col.today { border-color: var(--accent); background: var(--today); }

  .day-name {

<script>
// ─────────────────────────────────────────────
//  COSTANTI & STATO
// ─────────────────────────────────────────────
const DAYS_IT  = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const DAYS_FULL= ['Domenica','Lunedi','Martedi','Mercoledi','Giovedi','Venerdi','Sabato'];
const MONTHS   = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

let currentMonday = getMonday(new Date());
let records       = [];        // cache locale
let editingId     = null;      // recordId in modifica
let pendingSlot   = null;      // { date, pasto }
let starVal       = 0;

// ─────────────────────────────────────────────
//  UTILS DATE
// ─────────────────────────────────────────────
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();          // 0=dom
  const diff = (day === 0) ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function toISO(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

function isToday(d) {
  return toISO(d) === toISO(new Date());
}

// ─────────────────────────────────────────────
//  HEADER SETTIMANA
// ─────────────────────────────────────────────
function updateWeekLabel() {
  const sun = addDays(currentMonday, 6);
  const ml  = `${currentMonday.getDate()} ${MONTHS[currentMonday.getMonth()]}`;
  const sl  = `${sun.getDate()} ${MONTHS[sun.getMonth()]} ${sun.getFullYear()}`;
  document.getElementById('week-label').textContent = `${ml} – ${sl}`;
}

// ─────────────────────────────────────────────
//  AIRTABLE API
// ─────────────────────────────────────────────
function airtableHeaders() {
  return {
    'Authorization': `Bearer ${CONFIG.PAT}`,
    'Content-Type': 'application/json'
  };
}

function baseUrl() {
  return `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${CONFIG.TABLE_ID}`;
}

async function fetchWeek() {
  if (CONFIG.PAT === 'YOUR_AIRTABLE_PAT') {
    document.getElementById('config-banner').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('calendar').style.display = 'block';
    renderCalendar([]);
    return;
  }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('calendar').style.display = 'none';

  const dateFrom = toISO(currentMonday);
  const dateTo   = toISO(addDays(currentMonday, 6));
  const formula  = encodeURIComponent(`AND({Data}>="${dateFrom}", {Data}<="${dateTo}")`);
  const url      = `${baseUrl()}?filterByFormula=${formula}&pageSize=100`;

  try {
    const r = await fetch(url, { headers: airtableHeaders() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    records = data.records || [];
    renderCalendar(records);
  } catch(e) {
    showToast('Errore di connessione Airtable', true);
    renderCalendar([]);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('calendar').style.display = 'block';
  }
}

async function saveRecord(fields, id) {
  const method = id ? 'PATCH' : 'POST';
  const url    = id ? `${baseUrl()}/${id}` : baseUrl();
  const body   = id
    ? JSON.stringify({ fields })
    : JSON.stringify({ records: [{ fields }] });

  const r = await fetch(url, { method, headers: airtableHeaders(), body });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function deleteRecord(id) {
  const r = await fetch(`${baseUrl()}/${id}`, {
    method: 'DELETE',
    headers: airtableHeaders()
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
}

// ─────────────────────────────────────────────
//  RENDER CALENDARIO
// ─────────────────────────────────────────────
function renderCalendar(recs) {
  const cal = document.getElementById('calendar');

  // indice rapido: "YYYY-MM-DD|Pranzo" → record
  const idx = {};
  recs.forEach(rec => {
    const f   = rec.fields;
    const key = `${f.Data}|${f.Pasto}`;
    if (!idx[key]) idx[key] = [];
    idx[key].push(rec);
  });

  let html = '<div class="days-grid">';

  for (let i = 0; i < 7; i++) {
    const day    = addDays(currentMonday, i);
    const iso    = toISO(day);
    const todayCls = isToday(day) ? ' today' : '';

    html += `<div class="day-col${todayCls}">
      <div class="day-header">
        <div class="day-name">${DAYS_IT[(day.getDay())]}</div>
        <div class="day-num">${day.getDate()}</div>
      </div>`;

    ['Pranzo','Cena'].forEach(pasto => {
      const cls    = pasto.toLowerCase();
      const recsSlot = idx[`${iso}|${pasto}`] || [];

      html += `<div class="slot" data-date="${iso}" data-pasto="${pasto}">
        <div class="slot-label ${cls}">
          <span class="slot-dot"></span>${pasto}
        </div>`;

      if (recsSlot.length) {
        recsSlot.forEach(rec => {
          const f    = rec.fields;
          const stars = f.Rating ? '★'.repeat(f.Rating) : '';
          html += `<div class="pasto-card ${cls}" data-id="${rec.id}">
            <div class="pasto-piatto">${escHtml(f.Piatto||'')}</div>
            ${f.Categoria ? `<div class="pasto-cat">${escHtml(f.Categoria)}</div>` : ''}
            ${stars ? `<div class="pasto-stars">${stars}</div>` : ''}
          </div>`;
        });
      }

      html += `<button class="add-btn" data-date="${iso}" data-pasto="${pasto}">+ aggiungi</button>`;
      html += `</div>`;
    });

    html += `</div>`;
  }

  html += '</div>';
  cal.innerHTML = html;

  // event delegation
  cal.querySelectorAll('.slot').forEach(el => {
    el.addEventListener('click', onSlotClick);
  });
  cal.querySelectorAll('.add-btn').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openModal(null, el.dataset.date, el.dataset.pasto);
    });
  });
  cal.querySelectorAll('.pasto-card').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openModal(el.dataset.id);
    });
  });
}

function onSlotClick(e) {
  if (e.target.closest('.pasto-card') || e.target.closest('.add-btn')) return;
  openModal(null, this.dataset.date, this.dataset.pasto);
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(id, date, pasto) {
  editingId    = id || null;
  pendingSlot  = id ? null : { date, pasto };
  starVal      = 0;

  const titleEl = document.getElementById('modal-title');
  const delBtn  = document.getElementById('btn-delete');

  if (id) {
    const rec = records.find(r => r.id === id);
    const f   = rec ? rec.fields : {};
    document.getElementById('f-piatto').value    = f.Piatto || '';
    document.getElementById('f-categoria').value = f.Categoria || '';
    document.getElementById('f-note').value      = f.Note || '';
    starVal = f.Rating || 0;
    titleEl.textContent = `Modifica — ${f.Pasto} del ${f.Data}`;
    delBtn.style.display = 'block';
  } else {
    document.getElementById('f-piatto').value    = '';
    document.getElementById('f-categoria').value = '';
    document.getElementById('f-note').value      = '';
    const d = new Date(date + 'T12:00:00');
    titleEl.textContent = `${pasto} — ${DAYS_IT[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    delBtn.style.display = 'none';
  }

  renderStars();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-piatto').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null; pendingSlot = null;
}

function renderStars() {
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.val) <= starVal);
  });
}

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    starVal = parseInt(btn.dataset.val);
    renderStars();
  });
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.getElementById('btn-save').addEventListener('click', async () => {
  const piatto = document.getElementById('f-piatto').value.trim();
  if (!piatto) { showToast('Inserisci il nome del piatto', true); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Salvataggio...';

  const fields = {
    Piatto:    piatto,
    Categoria: document.getElementById('f-categoria').value || undefined,
    Note:      document.getElementById('f-note').value.trim() || undefined,
    Rating:    starVal || undefined
  };

  if (!editingId && pendingSlot) {
    fields.Data  = pendingSlot.date;
    fields.Pasto = pendingSlot.pasto;
  }

  try {
    if (editingId) {
      await saveRecord(fields, editingId);
    } else {
      await saveRecord(fields, null);
    }
    showToast(editingId ? 'Pasto aggiornato!' : 'Pasto aggiunto!');
    closeModal();
    await fetchWeek();
  } catch(e) {
    showToast('Errore nel salvataggio', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salva';
  }
});

document.getElementById('btn-delete').addEventListener('click', async () => {
  if (!editingId) return;
  if (!confirm('Eliminare questo pasto?')) return;
  try {
    await deleteRecord(editingId);
    showToast('Pasto eliminato');
    closeModal();
    await fetchWeek();
  } catch(e) {
    showToast('Errore eliminazione', true);
  }
});

// ─────────────────────────────────────────────
//  NAVIGAZIONE SETTIMANA
// ─────────────────────────────────────────────
document.getElementById('prev-week').addEventListener('click', () => {
  currentMonday = addDays(currentMonday, -7);
  updateWeekLabel();
  fetchWeek();
});
document.getElementById('next-week').addEventListener('click', () => {
  currentMonday = addDays(currentMonday, 7);
  updateWeekLabel();
  fetchWeek();
});
document.getElementById('go-today').addEventListener('click', () => {
  currentMonday = getMonday(new Date());
  updateWeekLabel();
  fetchWeek();
});

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
//  ESCAPE HTML
// ─────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
updateWeekLabel();
fetchWeek();
</script>
</body>
</html>
